name: Publish GitHub Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'App versionName (e.g., 1.3.2)'
        required: true
      release_notes:
        description: 'Release notes for the GitHub Release'
        required: false
        default: ''
      publish_draft:
        description: 'Publish as a Draft?'
        type: boolean
        required: false
        default: false

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$ENCODED_STRING" ]; then
          echo "$ENCODED_STRING" | base64 -d > release.keystore
          echo "Keystore decoded successfully."
        else
          echo "KEYSTORE_BASE64 secret is not set. The APK will be built but might fail signing."
        fi

    - name: Build Release APK
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Create Release Tag
      id: tag
      run: echo "tag_name=v${{ github.event.inputs.version_name }}" >> $GITHUB_OUTPUT

    - name: Rename APK
      run: mv app/build/outputs/apk/release/app-release.apk moodgleam.apk

    - name: Upload APK to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.tag_name }}
        name: moodgleam ${{ github.event.inputs.version_name }}
        body: ${{ inputs.release_notes }}
        files: moodgleam.apk
        draft: ${{ inputs.publish_draft }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
